<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - MariLancy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    .btn-teal { background-color: #2b9c96; color: white; transition: 0.2s; }
    .btn-teal:hover { background-color: #23827d; }
    .tab-btn.active { color: #2b9c96; border-bottom: 2px solid #2b9c96; }
    .custom-table th { background-color: #f1f5f9; color: #475569; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; padding: 12px 24px; }
    .custom-table td { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
  </style>
</head>
<body>

  <nav class="fixed top-0 left-0 w-full z-50 bg-black text-white px-8 py-4 flex justify-between items-center">
    <div class="flex-1">
      <a class="text-xl font-bold flex items-center gap-2" href="/admin">
        <i class="ri-briefcase-4-line text-2xl"></i> MariLancy <span class="text-[10px] bg-red-600 px-2 py-0.5 rounded ml-1">ADMIN</span>
      </a>
    </div>
    <div class="flex-1 flex justify-center gap-8 text-sm font-medium">
      <a href="#" onclick="showSection('stats')" class="nav-link text-white pb-1 border-b-2 border-teal-500" id="nav-stats">Overview</a>
      <a href="#" onclick="showSection('users')" class="nav-link text-gray-400 hover:text-white" id="nav-users">User Management</a>
      <a href="#" onclick="showSection('jobs')" class="nav-link text-gray-400 hover:text-white" id="nav-jobs">Job Moderation</a>
    </div>
    <div class="flex-1 flex justify-end items-center gap-5">
      <button onclick="logout()" class="btn-teal px-5 py-2 rounded-md text-sm font-semibold transition">Logout</button>
    </div>
  </nav>

  <div class="bg-black text-white text-center pt-32 pb-16 mb-8">
    <h1 class="text-4xl font-bold">Admin Central Panel</h1>
    <p class="text-gray-400 mt-2">Monitor data, kelola pengguna, dan awasi proyek.</p>
  </div>

  <main class="max-w-7xl mx-auto px-4 pb-20">
    <div id="section-stats">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-6">
          <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl"><i class="ri-user-star-line"></i></div>
          <div><p class="text-sm text-gray-500 font-medium">Freelancers</p><h3 id="totalFreelancers" class="text-3xl font-bold">-</h3></div>
        </div>
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-6">
          <div class="w-16 h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center text-3xl"><i class="ri-building-line"></i></div>
          <div><p class="text-sm text-gray-500 font-medium">Clients</p><h3 id="totalClients" class="text-3xl font-bold">-</h3></div>
        </div>
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-6">
          <div class="w-16 h-16 bg-orange-50 text-orange-600 rounded-full flex items-center justify-center text-3xl"><i class="ri-briefcase-line"></i></div>
          <div><p class="text-sm text-gray-500 font-medium">Jobs Published</p><h3 id="totalJobs" class="text-3xl font-bold">-</h3></div>
        </div>
      </div>
    </div>

    <div id="section-users" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex border-b">
          <button onclick="toggleUserTable('freelancer')" id="btn-tab-free" class="tab-btn px-8 py-4 font-semibold text-sm active">Freelancer List</button>
          <button onclick="toggleUserTable('client')" id="btn-tab-client" class="tab-btn px-8 py-4 font-semibold text-sm">Client List</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left custom-table">
            <thead id="userTableHeader"></thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="section-jobs" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b"><h3 class="font-bold text-gray-800">Job Moderation List</h3></div>
        <div class="overflow-x-auto">
          <table class="w-full text-left custom-table">
            <thead>
              <tr><th>Judul Proyek</th><th>Klien</th><th>Kategori</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="jobTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "admin") {
      alert("Akses ditolak");
      window.location.href = "/";
    }

    function logout() { localStorage.clear(); window.location.href = "/"; }

    function showSection(section) {
      ["stats", "users", "jobs"].forEach(s => {
        document.getElementById("section-" + s).classList.add("hidden");
        document.getElementById("nav-" + s).classList.remove("text-white", "border-b-2", "border-teal-500");
        document.getElementById("nav-" + s).classList.add("text-gray-400");
      });
      document.getElementById("section-" + section).classList.remove("hidden");
      document.getElementById("nav-" + section).classList.add("text-white", "border-b-2", "border-teal-500");

      if (section === "users") loadUserTable("freelancer");
      if (section === "jobs") loadJobTable();
    }

    async function safeFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
      });
      return res.ok ? await res.json() : null;
    }

    async function loadDashboard() {
      const data = await safeFetch("/admin/data");
      if (data) {
        document.getElementById("totalFreelancers").innerText = data.freelancers;
        document.getElementById("totalClients").innerText = data.clients;
        document.getElementById("totalJobs").innerText = data.jobs;
      }
    }

    function toggleUserTable(type) {
      document.getElementById("btn-tab-free").classList.toggle("active", type === "freelancer");
      document.getElementById("btn-tab-client").classList.toggle("active", type === "client");
      loadUserTable(type);
    }

    async function loadUserTable(type) {
      const data = await safeFetch(type === "freelancer" ? "/admin/freelancers" : "/admin/clients");
      const body = document.getElementById("userTableBody");
      document.getElementById("userTableHeader").innerHTML = `<tr><th>Nama</th><th>Email</th><th>${type === "freelancer" ? "Skill" : "Lokasi"}</th><th>Aksi</th></tr>`;
      
      if (!data || data.length === 0) {
        body.innerHTML = '<tr><td colspan="4" class="text-center py-4">Kosong</td></tr>';
        return;
      }

      body.innerHTML = data.map(u => `
        <tr>
          <td class="font-semibold">${u.nama || u.nama_client}</td>
          <td>${u.email}</td>
          <td>${u.skill || u.lokasi || "-"}</td>
          <td><button onclick="deleteUser('${type}', ${u.ID})" class="text-red-500 font-bold">Hapus</button></td>
        </tr>
      `).join("");
    }

    async function loadJobTable() {
      const data = await safeFetch("/admin/jobs");
      const body = document.getElementById("jobTableBody");
      if (!data || data.length === 0) {
        body.innerHTML = '<tr><td colspan="5" class="text-center py-4">Kosong</td></tr>';
        return;
      }
      body.innerHTML = data.map(j => `
        <tr>
          <td class="font-semibold">${j.judul}</td>
          <td>${j.client?.nama_client || "-"}</td>
          <td>${j.kategori}</td>
          <td><span class="px-2 py-1 rounded text-xs ${j.status==='dibuka'?'bg-green-100 text-green-700':'bg-gray-100'}">${j.status}</span></td>
          <td><button onclick="deleteJob(${j.id})" class="text-red-500 font-bold">Hapus</button></td>
        </tr>
      `).join("");
    }

    async function deleteUser(type, id) {
      if (confirm("Hapus user?")) {
        await fetch(`/admin/${type}s/${id}`, { method: "DELETE", headers: { "Authorization": "Bearer " + token } });
        loadUserTable(type); loadDashboard();
      }
    }

    async function deleteJob(id) {
      if (confirm("Hapus job?")) {
        await fetch(`/admin/jobs/${id}`, { method: "DELETE", headers: { "Authorization": "Bearer " + token } });
        loadJobTable(); loadDashboard();
      }
    }

    loadDashboard();
  </script>
</body>
</html>
