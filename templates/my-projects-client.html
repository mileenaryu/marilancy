<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantau Proyek - MariLancy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style> body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8fafc;
    }

    .text-teal-custom { color: #2b9c96; }
    .bg-teal-custom { background-color: #2b9c96; }
    .btn-teal {
      background-color: #2b9c96;
      color: white;
      transition: 0.2s;
    }
    .btn-teal:hover {
      background-color: #23827d;
    }

    .input-form {
      border: 1px solid #d1d5db;
      padding: 12px 16px;
      border-radius: 8px;
      width: 100%;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background-color: #ffffff;
    }
    .input-form:focus {
      border-color: #2b9c96;
      box-shadow: 0 0 0 3px rgba(43, 156, 150, 0.1);
    }

    .tag-checkbox input[type="checkbox"] { display: none; }
    .tag-checkbox span {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      font-size: 12px;
      color: #4b5563;
      cursor: pointer;
      transition: 0.2s;
    }
    .tag-checkbox input[type="checkbox"]:checked + span {
      background-color: #eaf6f4;
      color: #2b9c96;
      border-color: #2b9c96;
      font-weight: 600;
    }
    .footer-dark { background-color: #000000; color: #e5e7eb; padding: 60px 40px 30px 40px; font-size: 14px; margin-top: 80px; }
    .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 40px; padding-bottom: 40px; border-bottom: 1px solid #1f2937; }
    .footer-col h4 { color: white; font-weight: 600; font-size: 16px; margin-bottom: 20px; }
    .footer-col ul { list-style: none; padding: 0; margin: 0; }
    .footer-col ul li { margin-bottom: 12px; color: #9ca3af; cursor: pointer; transition: 0.2s; }
    .footer-col ul li:hover { color: white; }
    .newsletter-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
    .newsletter-input { background-color: transparent; border: 1px solid #4b5563; color: white; padding: 12px 15px; border-radius: 8px; font-size: 13px; outline: none; }
    .newsletter-input:focus { border-color: #2b9c96; }
    .newsletter-btn { background-color: #2b9c96; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .newsletter-btn:hover { background-color: #23827d; }
    .footer-bottom { max-width: 1200px; margin: 0 auto; padding-top: 20px; display: flex; justify-content: space-between; color: #6b7280; font-size: 12px; }

  </style>
</head>
<body>

  <nav class="fixed top-0 left-0 w-full z-50 bg-black text-white px-8 py-4 flex justify-between items-center">
    <div class="flex-1">
      <a class="text-xl font-bold flex items-center gap-2" href="/client">
        <i class="ri-briefcase-4-line text-2xl"></i> MariLancy
      </a>
    </div>

    <div class="flex-1 flex justify-center gap-8 text-sm font-medium">
      <a href="/client" onclick="setActive(this); goHome()" class="nav-link text-white pb-1">Dashboard</a>

      <a href="/client#post-job" onclick="setActive(this)" class="nav-link text-gray-400 hover:text-white">Posting Job</a>

      <a href="/client/projects" onclick="setActive(this)" class="text-white border-b-2 border-[#2b9c96] pb-1 font-semibold">Proyek</a>

      <a href="#message" onclick="setActive(this)" class="nav-link text-gray-400 hover:text-white">Pesan</a>
    </div>

    <div class="flex-1 flex justify-end items-center gap-5 ">
      <span id="userGreeting" class="text-sm font-medium"></span>
      <div class="profile-box cursor-pointer" onclick="goProfile()">
        <img id="profile_img" src="https://ui-avatars.com/api/?name=User" class="profile-img w-10 h-10 rounded-full object-cover" alt="User">
      </div>
      <button onclick="logout()" class="btn-teal px-5 py-2 rounded-md text-sm font-semibold transition">
        Logout
      </button>
      <div class="relative cursor-pointer" onclick="goNotification()">
        <i class="ri-notification-3-fill text-2xl text-yellow-500"></i>
        <span id="notifBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0 rounded-full hidden">0</span>
      </div>
    </div>
  </nav>

  <div class="bg-black text-white text-center pt-32 pb-20 mt-16">
    <h1 class="text-4xl font-bold tracking-wide">Pantau Proyek</h1>
    <p class="text-gray-400 mt-2 text-sm">Lihat progress dan hasil kerja dari para freelancer Anda</p>
  </div>

  <div class="max-w-5xl mx-auto px-4 py-10">
    
    <div id="projectsContainer" class="space-y-6">
      <p class="text-center text-gray-500 py-10">Memuat data proyek...</p>
    </div>

  </div>

  <script>
    const token = localStorage.getItem("token")
    const role = localStorage.getItem("role")

    if (!token) { alert("Silakan login dulu"); window.location.href = "/"; }
    if (role !== "client") { alert("Akses ditolak (bukan client)"); window.location.href = "/"; }

    async function safeFetch(url, options = {}) {
      const res = await fetch(url, options)
      if (res.status === 401) { alert("Session habis, login ulang"); localStorage.clear(); window.location.href = "/"; return null; }
      if (res.status === 403) { alert("Akses ditolak"); window.location.href = "/"; return null; }
      try { return await res.json() } catch { return null }
    }
    async function loadClientProjects() {
      if (!token) { window.location.href = "/"; return; }

      const profileRes = await fetch("/client/profile", { headers: { "Authorization": "Bearer " + token } });
      if (profileRes.ok) {
          const profile = await profileRes.json();
          const firstName = (profile.nama_client || "Klien").split(' ')[0];
          document.getElementById("userGreeting").innerText = `Hi, ${firstName}!`;
      }

      const res = await fetch("/client/my-projects", {
        headers: { "Authorization": "Bearer " + token }
      });
      
      const container = document.getElementById("projectsContainer");
      if (res.ok) {
        const projects = await res.json();
        container.innerHTML = "";

        if (!projects || projects.length === 0) {
            container.innerHTML = `<p class="text-center text-gray-500 py-10">Anda belum memiliki proyek yang sedang berjalan.</p>`;
            return;
        }

        for (const p of projects) {
            const isCompleted = p.status === 'completed';
            const badgeText = isCompleted ? 'Proyek Selesai' : 'Sedang dikerjakan';
            const badgeClass = isCompleted ? 'bg-teal-50 text-[#2b9c96]' : 'bg-blue-50 text-blue-600';
            const barColor = isCompleted ? '#2b9c96' : '#3b82f6'; 

            let actionButtons = `
              <div class="flex flex-col gap-2 items-end">
                 <a href="/client/workspace?project_id=${p.id}" class="bg-[#2b9c96] hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Pantau Proyek</a>
              </div>
            `;

            if (isCompleted) {

                let sudahRating = false;

                try {
                    const resRating = await fetch(
                        `/client/check-rating?freelancer_id=${p.freelancer.ID}&project_id=${p.id}`,
                        { headers: { "Authorization": "Bearer " + token } }
                    );

                    if (resRating.ok) {
                        const data = await resRating.json();
                        sudahRating = data.sudah_rating;
                    }
                } catch (e) {
                    console.log("Error cek rating:", e);
                }

                actionButtons = `
                  <div class="flex flex-col gap-2 items-end">
                    <a href="/client/workspace?project_id=${p.id}" 
                      class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">
                      Lihat Hasil & Unduh
                    </a>

                    ${
                      sudahRating
                      ? `<button disabled class="bg-gray-300 text-gray-600 px-6 py-2.5 rounded-lg text-xs font-bold cursor-not-allowed">
                          Sudah Dinilai
                        </button>`
                      : `<a href="/client/rating?project_id=${p.id}&freelancer_id=${p.freelancer.ID}" 
                          class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">
                          Beri Penilaian
                        </a>`
                    }
                  </div>
                `;
            } else if (p.progress === 100) {
                 actionButtons = `
                  <div class="flex flex-col gap-2 items-end">
                     <a href="/client/workspace?project_id=${p.id}" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Menunggu Penyerahan File</a>
                  </div>
                `;
            }

            container.innerHTML += `
              <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative transition hover:shadow-md">
                 <span class="absolute top-6 left-6 text-[10px] font-bold px-3 py-1 rounded-full ${badgeClass}">${badgeText}</span>
                 
                 <div class="flex flex-col md:flex-row gap-5 mt-10">
                    <img src="https://ui-avatars.com/api/?name=${p.freelancer.nama}&background=random&color=fff" class="w-14 h-14 rounded-full object-cover">
                    <div class="flex-1">
                       <h3 class="text-xl font-bold text-gray-900">${p.job.judul}</h3>
                       <p class="text-xs text-gray-500 mt-0.5">Dikerjakan oleh: <span class="font-bold text-gray-700">${p.freelancer.nama}</span></p>
                       
                       <div class="flex items-center gap-3 mt-4 pr-0 md:pr-32">
                          <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                             <div class="h-2.5 rounded-full" style="width: ${p.progress}%; background-color: ${barColor};"></div>
                          </div>
                          <span class="text-xs font-bold text-gray-600">${p.progress}%</span>
                       </div>
                    </div>
                 </div>

                 <div class="flex flex-col md:flex-row justify-between items-start md:items-end mt-8 gap-6">
                    <div class="flex flex-wrap gap-6 text-xs font-semibold text-gray-500">
                        <span class="flex items-center gap-1.5"><i class="ri-wallet-3-line text-[#2b9c96] text-base"></i> Rp ${p.job.budget ? p.job.budget.toLocaleString('id-ID') : "0"}</span>
                        <span class="flex items-center gap-1.5"><i class="ri-calendar-line text-[#2b9c96] text-base"></i> Dibuat: ${new Date(p.job.created_at).toLocaleDateString('id-ID')}</span>
                    </div>
                    
                    ${actionButtons}
                 </div>
              </div>
            `;
        };
      } else {
        container.innerHTML = `<p class="text-center text-red-500 py-10">Gagal memuat data. Pastikan Anda sudah login sebagai Klien.</p>`;
      }
    }
    async function loadProfileMini() {
      const data = await safeFetch("/client/profile", { headers: { "Authorization": "Bearer " + token } })
      if (!data) return
      
      localStorage.setItem("client_id", data.ID)
      const firstName = (data.nama || data.nama_client || "Klien").split(' ')[0]
      document.getElementById("userGreeting").innerText = `Hi, ${firstName}!`
      document.getElementById("profile_img").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName)}&background=2b9c96&color=fff`
    }
    function logout() { localStorage.clear(); alert("Berhasil logout"); window.location.href = "/"; }
    function goProfile() { window.location.href = "/client/profile/view" }
    loadProfileMini();
    loadClientProjects();
  </script>
</body>
</html>
