<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - MariLancy</title>

  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center/cover;
    }

    .glass {
      backdrop-filter: blur(18px);
      background: rgba(0,0,0,0.55);
    }
  </style>
</head>

<body class="h-screen flex text-white">


<div class="hidden md:flex w-1/2 items-center justify-center bg-black/80 backdrop-blur-sm px-16">
  <h1 class="text-5xl font-bold leading-tight">
    Cari Proyek <br>
    Freelance? <br>
    MariLancy aja!
  </h1>
</div>


<div class="w-full md:w-1/2 flex items-center justify-center bg-black/80 backdrop-blur-sm">

  <div class="w-[400px]">

    <h1 class="text-5xl font-semibold mb-8 text-center">Welcome Back</h1>

    <input id="email"
      class="w-full mb-4 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Email">

    <input id="password" type="password"
      class="w-full mb-6 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Password">

    <button onclick="login()"
      class="w-full bg-teal-500 hover:bg-teal-600 p-4 rounded-xl font-semibold">
      Sign in
    </button>

    <p id="error_msg" class="text-red-400 text-sm mt-3 hidden"></p>

    <div class="flex items-center my-6">
      <div class="flex-1 h-[1px] bg-gray-500"></div>
      <span class="px-3 text-sm text-gray-400">or</span>
      <div class="flex-1 h-[1px] bg-gray-500"></div>
    </div>

    <p class="text-center text-gray-400 mb-2">Sign in With Google</p>
    <div class="flex justify-center mb-6">
      <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black font-bold">
        G
      </div>
    </div>

    <p class="text-center text-sm text-gray-400">
      Belum punya akun?
      <a href="/register" class="text-teal-400">Register</a>
    </p>

  </div>

</div>


<script>

document.getElementById("email").addEventListener("input", clearError)
document.getElementById("password").addEventListener("input", clearError)

function clearError() {
  const errorBox = document.getElementById("error_msg")
  errorBox.classList.add("hidden")
  errorBox.innerText = ""
}


const token = localStorage.getItem("token")
const role = localStorage.getItem("role")

if (token && role) {
  if (role === "client") {
    window.location.href = "/client"
  } else if (role === "freelancer") {
    window.location.href = "/freelancer"
  } else if (role === "admin") {
    window.location.href = "/admin"
  }
}


async function login() {
  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value.trim()

  if (!email || !password) {
    showError("Email dan password wajib diisi")
    return
  }

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    console.log("🔥 RESPONSE:", data)

    if (!res.ok) {
      showError(data.error || "Login gagal")
      return
    }


    localStorage.setItem("token", data.token)
    localStorage.setItem("role", data.role)
    localStorage.setItem("client_id", data.user_id)

    console.log("✅ TOKEN:", data.token)
    console.log("✅ ROLE:", data.role)


    switch (data.role) {
      case "client":
        window.location.href = "/client"
        break
      case "freelancer":
        window.location.href = "/freelancer"
        break
      case "admin":
        window.location.href = "/admin"
        break
      default:
        showError("Role tidak dikenali")
    }

  } catch (err) {
    console.error("❌ ERROR LOGIN:", err)
    showError("Terjadi kesalahan server")
  }
}


function showError(msg) {
  const errorBox = document.getElementById("error_msg")
  errorBox.innerText = msg
  errorBox.classList.remove("hidden")
}
</script>

</body>
</html>
