.footer-bottom {

<body>



<nav class="fixed top-0 left-0 w-full z-50 bg-black text-white px-8 py-4 flex justify-between items-center">

<div class="flex-1">

<a class="text-xl font-bold flex items-center gap-2" href="/freelancer">

<i class="ri-briefcase-4-line text-2xl"></i> MariLancy

</a>

</div>



<div class="flex-1 flex justify-center gap-8 text-sm font-medium">

<a href="/freelancer" onclick="setActive(this)" class="nav-link text-gray-400 hover:text-white">Dashboard</a>

<a href="/freelancer/projects" onclick="setActive(this)" class="text-white border-b-2 border-[#2b9c96] pb-1 font-semibold">Proyek</a>

<a href="/freelancer/profile/view" onclick="setActive(this)" class="nav-link text-gray-400 hover:text-white">Lamaran</a>

</div>



<div class="flex-1 flex justify-end items-center gap-5 ">

<span id="userGreeting" class="text-sm font-medium"></span>

<div class="profile-box cursor-pointer" onclick="goProfile()">

<img id="profile_img"

src="https://ui-avatars.com/api/?name=User"

class="profile-img w-10 h-10 rounded-full object-cover" alt="User">

</div>

<button onclick="logout()" class="btn-teal px-5 py-2 rounded-md text-sm font-semibold transition">

Logout

</button>

<div class="relative cursor-pointer" onclick="goNotification()">

<i class="ri-notification-3-fill text-2xl text-yellow-500"></i>

<span id="notifBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0 rounded-full hidden">

0

</span>

</div>

<div class="bg-black text-white text-center pt-32 pb-20 mt-16">

<h1 class="text-4xl font-bold tracking-wide">Proyek Saya</h1>

</div>



<div class="max-w-5xl mx-auto px-4 py-10">


<div class="flex gap-4 mb-10">

<button class="bg-[#6366f1] text-white px-6 py-2 rounded-full text-sm font-bold shadow-sm">All</button>

<button class="bg-gray-300 text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-gray-400 transition">Proyek Aktif</button>

<button class="bg-gray-300 text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-gray-400 transition">Recent</button>

</div>



<div id="projectsContainer" class="space-y-6">

<p class="text-center text-gray-500 py-10">Memuat data proyek...</p>

</div>



</div>



<script>

const token = localStorage.getItem("token")
const role = localStorage.getItem("role")

    if (!token) {
      alert("Silakan login dulu")
      window.location.href = "/"
    }

    if (role !== "freelancer") {
      alert("Akses ditolak (bukan freelancer)")
      window.location.href = "/"
    }

    let globalJobs = []
    let currentDisplayedJobs = []
    let myApplications = []

async function safeFetch(url, options = {}) {
    const res = await fetch(url, options)
      if (res.status === 401) {
        alert("Session habis")
        localStorage.clear()
        window.location.href = "/"
        return null
      }
      if (res.status === 403) {
        alert("Akses ditolak")
        window.location.href = "/"
        return null
      }
      return await res.json()
    }


async function loadMyProjects() {

if (!token) { window.location.href = "/"; return; }


const profileRes = await fetch("/freelancer/profile", { headers: { "Authorization": "Bearer " + token } });

if (profileRes.ok) {

const profile = await profileRes.json();

const firstName = (profile.nama || "Freelancer").split(' ')[0];

document.getElementById("userGreeting").innerText = `Hi, ${firstName}!`;

document.getElementById("profile_img").src = profile.foto_profil || `https://ui-avatars.com/api/?name=${firstName}&background=2b9c96&color=fff`;

}


const res = await fetch("/freelancer/my-projects", {

headers: { "Authorization": "Bearer " + token }

});


const container = document.getElementById("projectsContainer");

if (res.ok) {

const projects = await res.json();

container.innerHTML = "";



if (!projects || projects.length === 0) {

container.innerHTML = `<p class="text-center text-gray-500 py-10">Kamu belum memiliki proyek yang sedang berjalan.</p>`;

return;

}



projects.forEach(p => {

const isCompleted = p.status === 'completed';

const badgeText = isCompleted ? 'Proyek Selesai' : 'Sedang dikerjakan';

const badgeClass = isCompleted ? 'bg-teal-50 text-[#2b9c96]' : 'bg-green-50 text-green-600';

const barColor = '#4ade80'; 



let actionButtons = `

<div class="flex flex-col gap-2 items-end">

<a href="/freelancer/workspace?project_id=${p.id}" class="bg-[#2b9c96] hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Lihat Detail</a>

</div>

`;



if (isCompleted) {


actionButtons = `

<div class="flex flex-col gap-2 items-end">

<a href="/freelancer/workspace?project_id=${p.id}" class="bg-[#2b9c96] hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Lihat Detail</a>

<span class="bg-gray-400 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm">Pembayaran Selesai</span>

</div>

`;

} else if (p.progress === 100) {


actionButtons = `

<div class="flex flex-col gap-2 items-end">

<a href="/freelancer/workspace?project_id=${p.id}" class="bg-[#2b9c96] hover:bg-teal-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Lihat Detail</a>

<a href="/freelancer/workspace?project_id=${p.id}" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-lg text-xs font-bold shadow-sm transition">Ajukan Penyelesaian</a>

</div>

`;

}



const ratingUI = isCompleted ? `<div class="absolute top-6 right-16 flex items-center gap-1 text-yellow-400 text-lg"><span class="text-black font-bold mr-2">4,7</span><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-half-fill"></i></div>` : '';



container.innerHTML += `

<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative transition hover:shadow-md">

<span class="absolute top-6 left-6 text-[10px] font-bold px-3 py-1 rounded-full ${badgeClass}">${badgeText}</span>


${ratingUI}



<div class="absolute top-6 right-6 text-gray-400 hover:text-gray-800 cursor-pointer"><i class="ri-bookmark-line text-xl"></i></div>


<div class="flex flex-col md:flex-row gap-5 mt-10">

<img src="https://ui-avatars.com/api/?name=${p.client.nama_client}&background=random&color=fff" class="w-14 h-14 rounded-full object-cover">

<div class="flex-1">

<h3 class="text-xl font-bold text-gray-900">${p.job.judul}</h3>

<p class="text-xs text-gray-500 mt-0.5">${p.client.nama_client}</p>


<div class="flex items-center gap-3 mt-4 pr-0 md:pr-32">

<div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">

<div class="h-2.5 rounded-full" style="width: ${p.progress}%; background-color: ${barColor};"></div>

</div>

<span class="text-xs font-bold text-gray-600">${p.progress}%</span>

</div>

</div>

</div>



<div class="flex flex-col md:flex-row justify-between items-start md:items-end mt-8 gap-6">

<div class="flex flex-wrap gap-6 text-xs font-semibold text-gray-500">

<span class="flex items-center gap-1.5"><i class="ri-briefcase-line text-[#2b9c96] text-base"></i> ${p.job.kategori || "-"}</span>

<span class="flex items-center gap-1.5"><i class="ri-time-line text-[#2b9c96] text-base"></i> ${p.job.tipe || "Full Time"}</span>

<span class="flex items-center gap-1.5"><i class="ri-wallet-3-line text-[#2b9c96] text-base"></i> Rp ${p.job.budget ? p.job.budget.toLocaleString('id-ID') : "0"}</span>

<span class="flex items-center gap-1.5"><i class="ri-map-pin-line text-[#2b9c96] text-base"></i> ${p.job.lokasi_pelaksanaan || "Remote"}</span>

</div>


${actionButtons}

</div>

</div>

`;

});

} else {

container.innerHTML = `<p class="text-center text-red-500 py-10">Gagal memuat data. Pastikan kamu sudah login.</p>`;

}

}

function getTimeLabel(date) {
      if (!date) return "Baru"
      const diff = Math.floor((new Date() - new Date(date)) / 60000)
      if (diff < 1) return "Just now"
      if (diff < 60) return diff + " min ago"
      if (diff < 1440) return Math.floor(diff / 60) + " jam ago"
      return Math.floor(diff / 1440) + " hari ago"
    }

async function loadNotificationCount() {
      const res = await safeFetch("/freelancer/applications", {
        headers: { "Authorization": "Bearer " + token }
      })
      if (!res) return
      const updated = res.filter(app => app.status === "accepted" || app.status === "rejected")
      const badge = document.getElementById("notifBadge")
      if (updated.length > 0) {
        badge.innerText = updated.length
        badge.classList.remove("hidden")
      } else {
        badge.classList.add("hidden")
      }
    }
function goProfile() {
      window.location.href = "/freelancer/profile/view"
    }
function goNotification() {
      window.location.href = "/freelancer/notification"
    }

function goHome() {

  const currentRole = localStorage.getItem("role");

  if (currentRole === "freelancer") {

  window.location.href = "/freelancer";

  } else if (currentRole === "client") {

  window.location.href = "/client";

  } else {

  window.location.href = "/guest";

  }

}



function logout() { localStorage.clear(); window.location.href = "/"; }


loadNotificationCount();
loadMyProjects();

</script>

</body>
